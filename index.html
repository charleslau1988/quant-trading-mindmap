    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    z-index: 100;

  /* 中心节点 */
  .center {

  /* 分支组 */
  .part-group {
    position: absolute;
    left: 50%;
    top: 50%;
  }
  
  /* Part标题 */
  .part-title {
    position: absolute;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.3s;

    transform: translate(-50%, -50%);
  }
  .part-title:hover { transform: translate(-50%, -50%) scale(1.08); }
  
  /* 连接线 */
  .line {

    left: 50%;
    top: 50%;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
    transform-origin: left center;
    z-index: 1;
  }
  
  /* 子章节容器 */
  .chapters-row {

    display: flex;
    gap: 10px;
    transform: translate(-50%, -50%);
    white-space: nowrap;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);

    transition: all 0.2s;
